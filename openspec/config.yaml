schema: spec-driven

context: |
  Tech stack: npm workspaces + Turborepo, Next.js 14 App Router, React 18, TypeScript strict, Tailwind CSS, Supabase.
  Architecture: feature-first web app under apps/web/features with components/hooks/services/store/types boundaries.
  Testing: no unit/e2e runner detected; use lint and typecheck as primary non-build verification.
  Style: ESLint 9 flat config, @typescript-eslint type-checked rules, Prettier, no any, interfaces for object shapes.

strict_tdd: false

testing:
  strict_tdd: false
  detected: 2026-05-13
  test_runner:
    available: false
    framework: null
    command: null
  layers:
    unit:
      available: false
      tool: null
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality_tools:
    linter:
      available: true
      command: npm run lint
    type_checker:
      available: true
      command: npm run typecheck
    formatter:
      available: true
      command: npm run format

rules:
  proposal:
    - Include rollback plan for risky changes.
    - Identify affected modules/packages.
  specs:
    - Use Given/When/Then format for scenarios.
    - Use RFC 2119 keywords: MUST, SHALL, SHOULD, MAY.
  design:
    - Document architecture decisions with rationale.
    - Keep raw personal finance documents out of runtime imports.
  tasks:
    - Group tasks by phase: domain, data mapping, verification, UI handoff.
    - Use hierarchical numbering.
    - Keep tasks small enough to complete in one session.
  apply:
    - Follow existing feature-first boundaries.
    - Do not introduce broad catch-all feature directories.
    - Do not run build commands automatically.
  verify:
    - Run targeted lint and typecheck when feasible.
    - Compare implementation against every spec scenario.
  archive:
    - Warn before merging destructive deltas or removing real-data source references.
